doc_type: actionbrief
version: "0.1.0"

# ─────────────────────────────────────────────────────────────
# Dataset Dictionary
# ─────────────────────────────────────────────────────────────
datasetDictionary:

  deduped_news:
    datasetSourceName: "Deduplicated News Articles"
    datasetDescription: >
      Daily parquet files containing deduplicated U.S. English news articles with
      full text and 768-dimensional BERT embeddings. Primary corpus for all
      downstream Energy Price scoring and event analyses.
    datasetAttribute: other
    datasetProvider: "Internal (raw feed deduplicated by project pipeline)"
    datasetGenerationInfo: >
      Raw daily news parquet files are deduplicated using a ±7-day sliding window:
      first by article_id, then by stripped title (keeping the earliest publication
      date per title). Produced by src/preprocessing/dedup.py.
    datasetPeriod: "2021-09-01 to 2026-05-01"
    datasetScale: "United States, English-language news"
    datasetSpatialResolution: "National (U.S.)"
    datasetTemporalResolution: "Daily"
    datasetPreprocessingInfo: >
      Deduplicated via ±7-day sliding window on article_id and stripped title.
      21,445,247 articles across 1,721 daily files retained after deduplication.
      Stored at data/processed/deduped_aug/YYYY-MM-DD.parquet.

  energy_price_scores:
    datasetSourceName: "Energy Price TMPT Scores"
    datasetDescription: >
      Daily parquet files containing TMPTv2 cosine similarity scores for each
      deduplicated article against 10 Energy Price keywords. Used to classify
      articles as Energy Price relevant (all 10 scores > 0.5).
    datasetAttribute: other
    datasetProvider: "Internal (TMPTv2 model applied by project pipeline)"
    datasetGenerationInfo: >
      Produced by src/preprocessing/energy_price_scoring.py using the TMPTv2
      fine-tuned model. Each article's 768-dim embedding is scored against
      10 Energy Price keyword representations.
    datasetPeriod: "2021-09-01 to 2026-05-01"
    datasetScale: "United States, English-language news"
    datasetSpatialResolution: "National (U.S.)"
    datasetTemporalResolution: "Daily"
    datasetPreprocessingInfo: >
      10 TMPT similarity scores per article. Threshold 0.5 on all 10 scores
      simultaneously defines the Energy Price relevance flag.
      Stored at data/processed/energy_price_scores/YYYY-MM-DD.parquet.

  energy_price_score_daily:
    datasetSourceName: "Energy Price TMPT Daily Mean Scores"
    datasetDescription: >
      Wide-format CSV with daily mean TMPTv2 scores and grand mean across all 10
      Energy Price keywords for relevant articles. Primary source for the semantic
      concreteness analysis (Q2).
    datasetAttribute: table
    datasetProvider: "Internal (project pipeline)"
    datasetGenerationInfo: >
      Produced by src/preprocessing/energy_price_score_daily.py. Filters each day's
      parquet to rel articles and computes per-keyword and grand mean scores.
    datasetPeriod: "2021-09-01 to 2026-05-01"
    datasetScale: "United States, English-language news"
    datasetSpatialResolution: "National (U.S.)"
    datasetTemporalResolution: "Daily"
    datasetPreprocessingInfo: >
      1,697 rows × 13 columns (date, 10 mean_score_* columns, grand_mean, N_rel).
      Days with zero rel articles have NaN scores.
      Stored at data/processed/energy_price_score_daily.csv.

  dedup_aug_stats:
    datasetSourceName: "Deduplicated Article Daily Statistics"
    datasetDescription: >
      Daily summary counts of total deduplicated articles. Used as denominator
      for Energy Price article proportion (Q1) and energy news density (X_ED).
    datasetAttribute: table
    datasetProvider: "Internal (project pipeline)"
    datasetGenerationInfo: >
      Produced by src/preprocessing/dedup.py. Records loaded, removed, and
      saved article counts per day.
    datasetPeriod: "2021-09-01 to 2026-05-01"
    datasetScale: "United States, English-language news"
    datasetSpatialResolution: "National (U.S.)"
    datasetTemporalResolution: "Daily"
    datasetPreprocessingInfo: >
      1,721 rows. Column `saved` = final deduplicated article count per day.
      Stored at data/processed/dedup_aug_stats.csv.

  country_daily_mentions:
    datasetSourceName: "Country Daily Mentions in Energy Price News"
    datasetDescription: >
      Long-format CSV with daily country mention count, proportion, and rel_count
      for all countries within Energy Price relevant articles. Primary source for
      geographic prominence analysis (Q3) and anomaly detection (Q4).
    datasetAttribute: table
    datasetProvider: "Internal (project pipeline)"
    datasetGenerationInfo: >
      Produced by src/preprocessing/country_daily_mentions.py using alias-based
      regex from data/raw/country_dict_0.json applied to rel article text.
    datasetPeriod: "2021-09-04 to 2026-05-01"
    datasetScale: "Global (249 countries)"
    datasetSpatialResolution: "Country"
    datasetTemporalResolution: "Daily"
    datasetPreprocessingInfo: >
      415,648 rows. Columns: date, country_id (ISO-3), count, proportion, rel_count.
      Stored at data/processed/country_daily_mentions.csv.

  country_rolling_zscores:
    datasetSourceName: "Country Rolling Z-scores"
    datasetDescription: >
      Wide-format CSVs with forward rolling z-scores of country mention proportions
      for three window sizes (W14, W21, W28 days). Used for anomaly detection (Q4).
    datasetAttribute: table
    datasetProvider: "Internal (project pipeline)"
    datasetGenerationInfo: >
      Produced by src/preprocessing/country_rolling_zscore.py. Forward rolling sum
      of mention counts divided by rolling rel_count, then z-score normalized.
    datasetPeriod: "2021-09-04 to 2026-04-15"
    datasetScale: "Top 30 countries"
    datasetSpatialResolution: "Country"
    datasetTemporalResolution: "Daily"
    datasetPreprocessingInfo: >
      1,642 rows × 31 columns (date + 30 country names) per window.
      Three files: country_rolling_zscore_W14d.csv, W21d.csv, W28d.csv.
      Consensus anomaly (z > 3 in all three windows) at country_anomaly_consensus.csv.

  event_daily_counts:
    datasetSourceName: "Event News Daily Counts"
    datasetDescription: >
      Wide-format CSV with daily counts of Energy Price rel articles matching
      keyword patterns for each of the 8 high-impact international events.
      Primary input for ETF regression event variables (Q6).
    datasetAttribute: table
    datasetProvider: "Internal (project pipeline)"
    datasetGenerationInfo: >
      Produced by src/preprocessing/event_news_count.py. Counts rel articles
      matching event keyword patterns defined in event.txt.
    datasetPeriod: "2021-09-01 to 2026-05-01"
    datasetScale: "United States, English-language news"
    datasetSpatialResolution: "National (U.S.)"
    datasetTemporalResolution: "Daily"
    datasetPreprocessingInfo: >
      1,697 rows × 10 columns (date, ARE_SAU, ESP, BRA, GEO, DEU, IRN, ISR, UKR,
      total_relevant_articles). IRN and ISR merged into IRN_ISR in regression.
      Stored at data/processed/event_news_daily.csv.

  etf_daily_prices:
    datasetSourceName: "ETF Daily Closing Prices"
    datasetDescription: >
      Daily closing prices for five U.S. energy ETFs (ICLN, IXC, VDE, XLE, XOP).
      Outcome and autoregressive variables in the ETF regression (Q6).
    datasetAttribute: table
    datasetProvider: "Market data provider"
    datasetGenerationInfo: >
      Downloaded as a single Excel file covering 2021-09-01 to 2026-05-22.
      Stored at data/raw/ETF_daily_US_2021-09-01_2026-05-22.xlsx.
    datasetPeriod: "2021-09-01 to 2026-05-22"
    datasetScale: "United States equity markets"
    datasetSpatialResolution: "N/A (financial)"
    datasetTemporalResolution: "Daily (trading days)"
    datasetPreprocessingInfo: >
      1,178 trading days × 5 tickers after feature construction.
      Non-trading days forward-filled before 14-day rolling window computation.

# ─────────────────────────────────────────────────────────────
# Variable Dictionary
# ─────────────────────────────────────────────────────────────
variableDictionary:

  energy_price_proportion:
    variableNameInDataset: "energy_price_proportion"
    variableNameInArticle: "Energy Price article proportion"
    variableAttribute: continuous
    variableUnit: "%"
    variableDescription: >
      Monthly proportion of Energy Price relevant articles in total news coverage.
      Captures aggregate media attention to energy pricing topics over time (Q1).
    variableSource: dedup_aug_stats
    observationNumber: 57

  mean_tmpt_score:
    variableNameInDataset: "grand_mean"
    variableNameInArticle: "Grand Mean TMPT Score"
    variableAttribute: continuous
    variableUnit: "index points [0, 1]"
    variableDescription: >
      Daily grand mean of TMPTv2 cosine similarity scores across all 10 Energy
      Price keywords for rel articles. Monthly Z-score used in visualization.
      Captures semantic concreteness of Energy Price coverage over time (Q2).
    variableSource: energy_price_score_daily
    observationNumber: 1676

  country_mention_rate:
    variableNameInDataset: "proportion"
    variableNameInArticle: "Country Mention Rate"
    variableAttribute: continuous
    variableUnit: "proportion [0, 1]"
    variableDescription: >
      Daily proportion of Energy Price relevant articles mentioning a specific
      country. Grand mean used for geographic map (Q3); rolling z-score used
      for anomaly detection (Q4).
    variableSource: country_daily_mentions
    observationNumber: 50280

  zscore_country:
    variableNameInDataset: "zscore"
    variableNameInArticle: "Country Mention Z-score"
    variableAttribute: continuous
    variableUnit: "standard deviations"
    variableDescription: >
      Forward rolling z-score of country mention proportion, averaged across
      W14, W21, W28 windows. Values above 3 indicate anomalous media attention
      to a country in Energy Price news (Q4).
    variableSource: country_rolling_zscores
    observationNumber: 50280

  X_E_event:
    variableNameInDataset: "X_E_ARE_SAU / X_E_ESP / X_E_BRA / X_E_GEO / X_E_DEU / X_E_IRN_ISR / X_E_UKR"
    variableNameInArticle: "Event News Intensity"
    variableAttribute: continuous
    variableUnit: "ratio [0, 1]"
    variableDescription: >
      14-day rolling ratio of Energy Price rel articles matching a specific event's
      keyword patterns to total rel articles. Captures geopolitical event coverage
      intensity within Energy Price news (Q6).
    variableSource: event_daily_counts
    observationNumber: 1697

  X_ED:
    variableNameInDataset: "X_ED"
    variableNameInArticle: "Energy News Density"
    variableAttribute: continuous
    variableUnit: "ratio [0, 1]"
    variableDescription: >
      14-day rolling ratio of Energy Price rel articles to total articles.
      Controls for secular changes in energy news volume in the ETF regression (Q6).
    variableSource: event_daily_counts
    observationNumber: 1697

  X_AR_etf:
    variableNameInDataset: "X_AR_ICLN / X_AR_IXC / X_AR_VDE / X_AR_XLE / X_AR_XOP"
    variableNameInArticle: "AR(ETF)"
    variableAttribute: continuous
    variableUnit: "USD"
    variableDescription: >
      14-day rolling mean of ETF closing price ending on day t. Autoregressive
      price control capturing baseline price momentum in the ETF regression (Q6).
    variableSource: etf_daily_prices
    observationNumber: 1178

  Y_etf:
    variableNameInDataset: "Y_ICLN / Y_IXC / Y_VDE / Y_XLE / Y_XOP"
    variableNameInArticle: "Forward ETF Price"
    variableAttribute: continuous
    variableUnit: "USD"
    variableDescription: >
      14-day forward rolling mean of ETF closing price from t+1. Outcome variable
      in the ETF regression capturing near-term price response to event news (Q6).
    variableSource: etf_daily_prices
    observationNumber: 1178

  delta_event:
    variableNameInDataset: "Coefficient (X_E_*)"
    variableNameInArticle: "Event Impact Coefficient (δ)"
    variableAttribute: continuous
    variableUnit: "USD per unit ratio"
    variableDescription: >
      OLS coefficient for each event variable on each ETF. Measures the association
      between a 1-unit increase in event news intensity and the 14-day forward mean
      ETF price, conditional on autoregressive price and energy news density.
      5 ETFs × 7 events = 35 coefficients (Q6).
    variableSource: etf_daily_prices
    observationNumber: 35

# ─────────────────────────────────────────────────────────────
# Table Dictionary
# ─────────────────────────────────────────────────────────────
tableDictionary:

  table_yearly_stats:
    tableId: "table_yearly_stats"
    tablePath: "tables/table_yearly_stats.xlsx"
    tableCaption: "Annual Energy Price news article counts and shares"
    tableAim: >
      Demonstrate the growth in the absolute number and relative share of Energy
      Price relevant articles in total news coverage from 2021 to 2026 (Q1).
    tableExplanation: >
      Rows are calendar years (2021–2026) plus a full-period Total row.
      Columns: Energy Price Articles (N_rel), Irrelevant Articles (N_irrel),
      Total Articles (N_total), EP Share (%) = N_rel / N_total × 100.
      Partial years (2021: Sep–Dec; 2026: Jan–May) reflect covered months only.
    tableSuitableSection: "Data and Measurement"

  table_events:
    tableId: "table_events"
    tablePath: "tables/table_events.xlsx"
    tableCaption: "Eight high-impact international events in Energy Price news"
    tableAim: >
      Document the 8 high-impact geopolitical events identified by TF-IDF analysis
      of country anomaly windows, with their keywords and descriptions (Q5).
    tableExplanation: >
      Each row is one event. Columns: Event Label (code used in regression),
      Keywords (patterns matched in article text), Description (brief explanation
      of the geopolitical episode). Events are ordered as in event.txt.
    tableSuitableSection: "Data and Measurement"

  table_regression_wide:
    tableId: "table_regression_wide"
    tablePath: "tables/table_regression_wide.xlsx"
    tableCaption: "OLS regression of ETF prices on event news intensity"
    tableAim: >
      Report the association between each international event's news intensity and
      14-day forward ETF prices across five energy ETFs, controlling for
      autoregressive price levels and energy news density (Q6).
    tableExplanation: >
      Stargazer-style table. Columns are five ETFs (ICLN, IXC, VDE, XLE, XOP).
      Rows alternate: coefficient with significance stars (* p<0.05, ** p<0.01,
      *** p<0.001, . p<0.1) and standard error in parentheses. Bottom rows show
      R², Adj. R², and N. Variable names are human-readable (see labels.py).
    tableSuitableSection: "Results"

# ─────────────────────────────────────────────────────────────
# Figure Dictionary
# ─────────────────────────────────────────────────────────────
figureDictionary:

  fig_prop_monthly:
    figureId: "fig_prop_monthly"
    figurePath: "figures/fig_prop_monthly.png"
    figureCaption: "Monthly share of Energy Price articles in total news"
    figureAim: >
      Show that the proportion of Energy Price articles in total U.S. English
      news coverage has grown over 2021–2026, evidencing rising media attention
      to energy pricing topics (Q1).
    figureExplanation: >
      Single-panel line chart. X-axis: month (2021-09 to 2026-05). Y-axis:
      Energy Price article proportion (%). Red line with shaded area below.
      Each point is the monthly ratio N_rel / N_total × 100.
    figureSuitableSection: "Results"

  fig_score_monthly:
    figureId: "fig_score_monthly"
    figurePath: "figures/fig_score_monthly.png"
    figureCaption: "Monthly semantic concreteness of Energy Price articles"
    figureAim: >
      Demonstrate that Energy Price articles have become semantically more focused
      over time, as measured by the monthly Z-score of the grand mean TMPTv2
      relevance score across 10 Energy Price keywords (Q2).
    figureExplanation: >
      Single-panel line chart. X-axis: month. Y-axis: Z-score of monthly grand
      mean TMPT relevance score. Purple line with shaded area above zero (purple)
      and below zero (grey). A positive trend indicates increasing semantic
      coherence of Energy Price articles over time.
    figureSuitableSection: "Results"

  fig_country_map:
    figureId: "fig_country_map"
    figurePath: "figures/fig_country_map.png"
    figureCaption: "Geographic distribution of country mentions in Energy Price news"
    figureAim: >
      Show which countries are most prominently co-mentioned with Energy Price
      topics in U.S. news across the full study period, with the United States
      as the reference geography (Q3).
    figureExplanation: >
      World map choropleth. United States shown in grey (reference; excluded from
      color scale). Other countries colored white-to-red proportional to grand mean
      mention rate in Energy Price rel articles. Blue ocean background with
      latitude/longitude grid. Color bar labeled 'Mean Mention Rate'.
    figureSuitableSection: "Results"

  fig_country_zscore_heatmap:
    figureId: "fig_country_zscore_heatmap"
    figurePath: "figures/fig_country_zscore_heatmap.png"
    figureCaption: "Daily anomaly Z-scores for top 30 countries in Energy Price news"
    figureAim: >
      Identify when and for which countries Energy Price news coverage became
      anomalously intense, using daily consensus z-scores across three rolling
      windows (Q4).
    figureExplanation: >
      Portrait-orientation heatmap. Y-axis: date (daily, 2021-09 to 2026-04),
      labeled by month (YYYY-MM). X-axis: top 30 countries ordered by mention rank.
      Cell color: mean z-score across W14/W21/W28 windows, using a diverging
      colormap (blue = negative, white = 0, red = high positive).
      Purple cells indicate anomaly (z > 3 consensus threshold).
    figureSuitableSection: "Results"

# ─────────────────────────────────────────────────────────────
# Analysis Structure Brief
# ─────────────────────────────────────────────────────────────
analysisStructureBrief:
  overview: >
    An observational associational study of U.S. English-language news coverage
    of Energy Price topics from 2021-09 to 2026-05 (~56 months, >21M articles).
    The pipeline proceeds in six analytical levels: (1) data preparation and corpus
    construction; (2) coverage growth and semantic concreteness analysis; (3) geographic
    prominence of countries in Energy Price discourse; (4) country-level anomaly
    detection using rolling z-scores; (5) TF-IDF identification of high-impact
    international events; and (6) OLS regression of energy ETF prices on event news
    intensity. All results are observational and associational; no causal claims are made.

  levels:

    - levelName: "Data Preparation and Corpus Construction"
      levelAim: >
        Construct a clean, deduplicated corpus of Energy Price relevant articles and
        derive all intermediate datasets required for downstream analyses.
      inputs:
        - "Raw daily news parquet files (data/raw/)"
        - "TMPTv2 pre-trained model"
        - "Country alias dictionary (data/raw/country_dict_0.json)"
        - "ETF daily prices (data/raw/ETF_daily_US_2021-09-01_2026-05-22.xlsx)"
      modelOrMethod: >
        Deduplication via ±7-day sliding window (article_id then stripped title).
        TMPTv2 cosine similarity scoring against 10 Energy Price keywords (threshold
        0.5 on all 10 scores). Regex-based country mention counting using alias dictionary.
      outputs:
        - "data/processed/deduped_aug/ (deduplicated articles)"
        - "data/processed/energy_price_scores/ (TMPT scores)"
        - "data/processed/dedup_aug_stats.csv (daily totals)"
        - "data/processed/energy_price_score_daily.csv (daily mean scores)"
        - "data/processed/country_daily_mentions.csv (country mentions)"
      interpretation: >
        The Energy Price relevant corpus (rel) is defined by all 10 TMPT scores
        exceeding 0.5. All downstream analyses are conducted within this rel pool,
        removing between-topic confounding from the broader news corpus.

    - levelName: "Coverage Growth and Semantic Concreteness"
      levelAim: >
        Quantify whether Energy Price news has grown as a share of total news (Q1)
        and whether rel articles have become more semantically focused over time (Q2).
      inputs:
        - "data/processed/dedup_aug_stats.csv"
        - "data/processed/event_news_daily.csv (total_relevant_articles)"
        - "data/processed/energy_price_score_daily.csv"
      modelOrMethod: >
        Monthly aggregation of N_rel / N_total for proportion time series.
        Monthly grand mean of 10 TMPT keyword scores, Z-score normalized.
      outputs:
        - "figures/fig_prop_monthly.png"
        - "tables/table_yearly_stats.xlsx"
        - "figures/fig_score_monthly.png"
      interpretation: >
        An upward trend in fig_prop_monthly indicates growing media attention to
        Energy Price. A positive trend in fig_score_monthly indicates articles are
        becoming more semantically coherent around energy pricing framing.

    - levelName: "Geographic Prominence Analysis"
      levelAim: >
        Identify which countries are most prominently co-mentioned with Energy Price
        topics in U.S. news, and visualize the geographic distribution (Q3).
      inputs:
        - "data/processed/country_daily_mentions.csv"
      modelOrMethod: >
        Grand mean mention rate per country across all days. United States treated
        as reference geography and shown separately on map.
      outputs:
        - "figures/fig_country_map.png"
      interpretation: >
        Countries with high mention rates are prominently associated with Energy
        Price discourse in U.S. news. Expected concentration in Western Europe,
        Middle East, and East Asia reflects geopolitical energy supply chains.

    - levelName: "Country Anomaly Detection"
      levelAim: >
        Identify date-country pairs where Energy Price news coverage was anomalously
        intense, using a consensus z-score approach across three rolling windows (Q4).
      inputs:
        - "data/processed/country_daily_mentions.csv"
        - "data/processed/top30_countries.csv"
      modelOrMethod: >
        Forward rolling z-score of country mention proportion for W=14, 21, 28 days.
        Consensus anomaly defined as z > 3 in all three windows simultaneously.
        Heatmap visualizes mean z-score across all three windows daily.
      outputs:
        - "data/processed/country_rolling_zscore_W{14,21,28}d.csv"
        - "data/processed/country_anomaly_consensus.csv"
        - "figures/fig_country_zscore_heatmap.png"
      interpretation: >
        Clusters of purple cells in the heatmap identify episodes of anomalous
        country-level media attention in Energy Price news, corresponding to
        geopolitical events that drive subsequent TF-IDF event identification.

    - levelName: "TF-IDF Event Identification"
      levelAim: >
        Identify the high-impact international events that generated anomalous
        Energy Price news coverage, using TF-IDF analysis of anomaly windows (Q5).
      inputs:
        - "data/processed/country_anomaly_consensus.csv"
        - "data/processed/country_articles/{country_id}/{date}.parquet"
      modelOrMethod: >
        Per-country TF-IDF distinctiveness (ngram 1–4) comparing anomaly window
        articles against control articles. Top 100 terms per country-window saved.
        Human review of top terms produces event.txt (8 events with keyword patterns).
      outputs:
        - "data/processed/country_tfidf/{country_id}.csv"
        - "data/processed/country_tfidf/event.txt"
        - "data/processed/event_news_daily.csv"
        - "tables/table_events.xlsx"
      interpretation: >
        Each event in event.txt represents a geopolitical episode that generated
        a statistically anomalous spike in country-specific Energy Price news
        coverage. The 8 events selected are: ARE_SAU (COP28), ESP (Power Outage),
        BRA (COP30), GEO (Gas Dispute), DEU (Nord Stream), IRN (Iran War),
        ISR (Iran-Israel Gulf), UKR (Ukraine Invasion).

    - levelName: "ETF Regression"
      levelAim: >
        Quantify the association between each international event's news intensity
        and 14-day forward energy ETF prices, controlling for autoregressive price
        levels and aggregate energy news density (Q6).
      inputs:
        - "data/processed/event_news_daily.csv"
        - "data/processed/dedup_aug_stats.csv"
        - "data/raw/ETF_daily_US_2021-09-01_2026-05-22.xlsx"
      modelOrMethod: >
        OLS regression per ETF (5 models). Outcome: 14-day forward mean ETF close.
        Regressors: 5 AR price terms, energy news density (X_ED), 7 event intensity
        ratios (X_E_*). All rolling windows are 14 calendar days. N = 1,178 trading days.
      outputs:
        - "data/results/etf_regression_results.csv"
        - "tables/table_regression_wide.xlsx"
      interpretation: >
        Significant positive δ coefficients indicate that higher event news intensity
        is associated with higher forward ETF prices. Ukraine (UKR) is significant
        across all 5 ETFs. ICLN is most sensitive to the DEU (Nord Stream) and
        ARE_SAU (COP28) events. XOP shows the largest coefficient for UKR (+5.33),
        consistent with oil exploration ETFs being most exposed to geopolitical supply risk.
